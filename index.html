<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Tareas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <h1>Gestión de Tareas</h1>

  <!-- AGREGAR USUARIO -->
  <div class="card">
    <h3>Agregar Usuario</h3>
    <input id="userName" placeholder="Nombre del usuario">
    <button onclick="addUser()">Agregar</button>
  </div>

  <!-- AGREGAR / EDITAR TAREA -->
  <div class="card">
    <h3 id="formTitle">Agregar Tarea</h3>
    <input id="title" placeholder="Nombre de la tarea">
    <select id="userId"></select>
    <button onclick="saveTask()">Guardar</button>
    <button onclick="cancelEdit()" id="cancelBtn" style="display:none;">Cancelar</button>
  </div>

  <!-- BUSCADOR -->
  <div class="card">
    <input id="search" placeholder="Buscar por ID o nombre..." oninput="filterTasks()">
  </div>

  <!-- LISTA -->
  <div id="tasks"></div>
</div>

<script src="app.js"></script>
</body>
</html>
